<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wata23 packages を VCC に追加</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.7;
    }
    .button {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid #888;
      font-weight: bold;
    }
    code, pre {
      background: #f5f5f5;
      padding: 0.2em 0.4em;
      border-radius: 4px;
    }
    pre {
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>wata23 packages を VCC に追加</h1>

  <p>
    下のボタンをクリックすると、VRChat Creator Companion で
    community repository の追加を試みます。
  </p>

  <p>
    <a class="button"
       href="vcc://vpm/addRepo?url=https%3A%2F%2Fwata23.github.io%2Fwata23-packages%2Findex.json">
      VCCに追加
    </a>
  </p>

  <p>
    うまく開かない場合は、VCC の
    <code>Settings → Packages → Add Repository</code>
    から、下記URLを手動で追加してください。
  </p>

  <pre>https://wata23.github.io/wata23-packages/index.json</pre>
</body>
</html>
